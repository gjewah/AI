[tool.ruff]
line-length = 120

[tool.ruff.lint]
# Begrunnede Odoo-mønstre — vurdert mot koden 24.07.2026, ikke slått av for å få gaten grønn.
ignore = [
    # `__init__.py` laster undermoduler (`from . import tests`). Ubrukt i Python-forstand,
    # men PÅKREVD av Odoo: fjernes den, lastes ikke innholdet.
    "F401",
    # `__manifest__.py` er en frittstående ordbok — Odoos eget filformat, ikke en feil.
    "B018",
]
