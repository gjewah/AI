[tool.ruff]
line-length = 120

[tool.ruff.lint]
# Unntakene under er BEGRUNNEDE Odoo-mønstre, ikke lat kode. Hver enkelt er vurdert
# mot koden 24.07.2026 — de er ikke slått av for å få gaten grønn.
#
# 🛑 Regelen som gjelder: rett ALDRI et lint-treff ved å fjerne kode du ikke forstår.
#    Er treffet et bevisst mønster, dokumenter unntaket. Er det en ekte feil, rett den.
ignore = [
    # ── BLE001 «blind except» · S110 «try-except-pass» ────────────────────────────────
    # Dette ER kanon i Kontrollrommet, ikke slurv. Forsiden spør ~10 valgfrie kilder
    # (hr_attendance, bus.presence, hr_holidays, account, documents …). Én modul som
    # mangler eller feiler skal ALDRI ta ned hele flaten for alt det andre.
    #
    # Mønsteret er `with self.env.cr.savepoint():` + bredt `except` — og savepointen er
    # nettopp grunnen til at det brede unntaket er RIKTIG her: PostgreSQL avbryter HELE
    # transaksjonen ved en SQL-feil, så et smalt `except` ville latt neste kall dø med
    # «current transaction is aborted». Odoo core bruker samme mønster
    # (account/models/chart_template.py:248).
    #
    # 🔑 Å bytte til smale unntak ville krevd at vi kjenner ALLE feiltyper hver valgfri
    #    modul kan kaste — det er umulig å vite, og en bom gir hvit skjerm i produksjon.
    "BLE001",
    "S110",

    # ── F401 «unused import» ──────────────────────────────────────────────────────────
    # Alle 11 treff er Odoos PÅKREVDE modulstruktur: `__init__.py` som laster
    # undermoduler (`from . import models`). De ER ubrukte i Python-forstand, men
    # fjernes de, lastes ikke modellene og modulen virker ikke i det hele tatt.
    "F401",

    # ── B018 «useless expression» ─────────────────────────────────────────────────────
    # Treffer `__manifest__.py`, som ER en frittstående ordbok — Odoos eget filformat.
    # Å «rette» den ville gjort manifestet ugyldig.
    "B018",

    # ── DTZ007 «strptime uten %z» ─────────────────────────────────────────────────────
    # Ett treff (`_kr_.../%H:%M`). Klokkeslettet er BEVISST naivt: det settes på
    # brukerens lokale dato rett etterpå via `fields.Datetime.context_timestamp`.
    # Å legge tidssone på selve parsingen ville gitt DOBBEL konvertering — feil tid vist.
    "DTZ007",
]
